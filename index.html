            if (!timeStr || !durationMins) return "";
            const [hours, minutes] = timeStr.split(":").map(Number);
            const totalMins = hours * 60 + minutes + parseInt(durationMins);
            const endHours = Math.floor(totalMins / 60) % 24;
            const endMins = totalMins % 60;
            return `${String(endHours).padStart(2, '0')}:${String(endMins).padStart(2, '0')}`;
        };

        // ===== 自定义悬浮下拉选择框组件 (支持单选/多选切换) =====

                    document.addEventListener('mousedown', handleClickOutside);

                if (isMulti) {
                    if (selectedValues.includes(val)) {
                        onChange(selectedValues.filter(x => x !== val));

                        onChange([...selectedValues, val]);
                    }
                } else {
                    onChange([val]);

        // ===== 核心组件：支持首字母A-Z快速滑动定位的影片选择器 (支持单选/多选) =====
        const MovieSelectorModal = ({ availableMovies, selectedMovies, onClose, onSelect }) => {

                    if (b === '#') return -1;

        const App = () => {
            const [selectedDates, setSelectedDates] = useState([]);

            const [selectedUnits, setSelectedUnits] = useState([]);
            const [selectedMovies, setSelectedMovies] = useState([]);
            const [hasActivity, setHasActivity] = useState(false);
            
            const [showMovieSelector, setShowMovieSelector] = useState(false);
            const [isGalleryOpen, setIsGalleryOpen] = useState(false); 
            const [lightboxIndex, setLightboxIndex] = useState(null); 
            const [showContactModal, setShowContactModal] = useState(false); 
            
            const [showTopBtn, setShowTopBtn] = useState(false); 

            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);

            const [copiedWechat, setCopiedWechat] = useState(false);
            const [copiedEmail, setCopiedEmail] = useState(false);

            const [movieData, setMovieData] = useState([]);
            const [parseError, setParseError] = useState("");
            
            useEffect(() => {
                if (!RAW_CSV_DATA || RAW_CSV_DATA.trim() === "") {
                    setParseError("请先在代码中粘贴排片表数据 (CSV格式)。");
                    return;
                }
                const lines = RAW_CSV_DATA.trim().split(/\r?\n/);
                let headerIndex = -1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes("影片中文名") || lines[i].includes("影片名称")) {
                        headerIndex = i;
                        break;
                    }
                }
                
                const validCsvString = headerIndex !== -1 ? lines.slice(headerIndex).join("\n") : RAW_CSV_DATA.trim();

                Papa.parse(validCsvString, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const parsed = [];
                        results.data.forEach(row => {
                            const name = row["影片中文名"] || row["影片名称"] || "";
                            // ✨ 新增年份解析 ✨
                            const year = row["年份"] || ""; 
                            const timeStr = row["放映时间"] || "";
                            const duration = row["片长(分钟)"] || row["片长"] || "90";
                            const venue = row["影院"] || "";
                            const activity = row["活动信息"] || "";
                            const unit = row["单元"] || ""; 
                            const doubanScore = row["豆瓣评分"] || ""; 
                            const doubanLink = row["豆瓣链接"] || "";   

                            if (!name || !timeStr || !venue) return; 

                            const timeParts = timeStr.trim().split(" ");
                            if (timeParts.length < 2) return;
                            
                            const date = timeParts[0]; 
                            const time = timeParts[1].substring(0, 5); 

                            parsed.push({
                                name, year, date, time, duration, venue, activity, unit, doubanScore, doubanLink
                            });
                        });
                        
                        if (parsed.length === 0) {
                            setParseError("未识别到有效的排片数据，请检查粘贴的数据格式。");
                        } else {
                            setMovieData(parsed);
                        }
                    }
                });
            }, []);

            const dates = useMemo(() => Array.from(new Set(movieData.map(m => m.date))).sort(), [movieData]);
            const venues = useMemo(() => Array.from(new Set(movieData.map(m => m.venue))).sort(), [movieData]);
            const units = useMemo(() => Array.from(new Set(movieData.map(m => m.unit).filter(Boolean))).sort(), [movieData]);
            
            const availableMovies = useMemo(() => {
                let filtered = movieData;
                if (selectedUnits.length > 0) {
                    filtered = filtered.filter(m => selectedUnits.includes(m.unit));
                }
                return Array.from(new Set(filtered.map(m => m.name))); 
            }, [movieData, selectedUnits]);

            useEffect(() => {
                if (selectedMovies.length > 0) {
                    const validSelections = selectedMovies.filter(m => availableMovies.includes(m));
                    if (validSelections.length !== selectedMovies.length) {
                        setSelectedMovies(validSelections);
                    }
                }
            }, [selectedUnits, availableMovies, selectedMovies]);

            // 🌟 优化后的滚动监听代码，兼容各种浏览器确保按钮浮现 🌟
            useEffect(() => {
                const handleScroll = () => {
                    const scrollTop = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop;
                    // 当页面向下滚动超过 100 像素时就显示按钮
                    if (scrollTop > 100) {
                        setShowTopBtn(true);
                    } else {
                        setShowTopBtn(false);
                    }
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scheduleData = useMemo(() => {
                if (movieData.length === 0) return {};

                let filtered = movieData.filter(m => {
                    if (selectedDates.length > 0 && !selectedDates.includes(m.date)) return false;
                    if (selectedVenues.length > 0 && !selectedVenues.includes(m.venue)) return false;
                    if (selectedUnits.length > 0 && !selectedUnits.includes(m.unit)) return false;
                    if (selectedMovies.length > 0 && !selectedMovies.includes(m.name)) return false;
                    if (hasActivity && (!m.activity || m.activity.trim() === "")) return false;
                    return true;
                });

                filtered.sort((a, b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    return a.time.localeCompare(b.time);
                });

                const grouped = {};
                filtered.forEach(movie => {
                    if (!grouped[movie.date]) grouped[movie.date] = {};
                    if (!grouped[movie.date][movie.venue]) grouped[movie.date][movie.venue] = [];
                    
                    grouped[movie.date][movie.venue].push({
                        ...movie,
                        endTime: calculateEndTime(movie.time, movie.duration)
                    });
                });

                return grouped;
            }, [selectedDates, selectedVenues, selectedUnits, selectedMovies, hasActivity, movieData]);

            const onTouchStart = (e) => {
                setTouchEnd(null);
                setTouchStart(e.targetTouches[0].clientX);
            };
            const onTouchMove = (e) => setTouchEnd(e.targetTouches[0].clientX);
            const onTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                const distance = touchStart - touchEnd;
                const isLeftSwipe = distance > 50;
                const isRightSwipe = distance < -50;
                
                if (isLeftSwipe && lightboxIndex < FULL_LIST_IMAGES.length - 1) {
                    setLightboxIndex(prev => prev + 1);
                }
                if (isRightSwipe && lightboxIndex > 0) {
                    setLightboxIndex(prev => prev - 1);
                }
            };

            const handleCopy = (text, type) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    if(type === 'wechat') {
                        setCopiedWechat(true);
                        setTimeout(() => setCopiedWechat(false), 2000);
                    } else {
                        setCopiedEmail(true);
                        setTimeout(() => setCopiedEmail(false), 2000);
                    }
                } catch (err) {
                    console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="app-container flex flex-col relative">
                    
                    {/* ===== 拼音排序影片选择器 ===== */}
                    {showMovieSelector && (
                        <MovieSelectorModal 
                            availableMovies={availableMovies} 
                            selectedMovies={selectedMovies}

                    {/* ===== 完整片单 图库弹窗 (缩略图) ===== */}
                    {isGalleryOpen && (
                        <div className="fixed inset-0 z-[60] bg-white flex flex-col">
                            <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200 bg-white sticky top-0 z-10 shadow-sm">
                                <h2 className="text-lg font-bold text-gray-800">完整片单图库</h2>
                                <button 
                                    className="text-gray-500 hover:text-gray-800 p-1"

                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 bg-gray-50">
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                    {FULL_LIST_IMAGES.map((imgSrc, idx) => (
                                        <div 
                                            key={idx} 
                                            className="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden cursor-pointer hover:shadow-md transition-shadow aspect-auto flex items-center justify-center p-1"
                                            onClick={() => setLightboxIndex(idx)}
                                        >
                                            <img 
                                                src={imgSrc} 
                                                alt={`片单缩略图 ${idx + 1}`} 
                                                className="w-full h-auto object-contain rounded"
                                                onError={(e) => {
                                                    e.target.onerror = null;
                                                    e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="150" fill="%23f3f4f6"><rect width="100%" height="100%"/><text x="50%" y="50%" fill="%239ca3af" font-size="14" text-anchor="middle" dy=".3em">待替换</text></svg>';
                                                }}
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ===== 大图浏览弹窗 ===== */}
                    {lightboxIndex !== null && (
                        <div className="fixed inset-0 z-[70] bg-black bg-opacity-95 flex flex-col touch-none">
                            <div className="flex items-center justify-between px-4 py-4 text-white absolute top-0 w-full z-10 bg-gradient-to-b from-black/60 to-transparent pointer-events-none">
                                <span className="text-sm font-medium tracking-widest">{lightboxIndex + 1} / {FULL_LIST_IMAGES.length}</span>
                                <button 
                                    className="p-2 bg-black/40 rounded-full hover:bg-black/60 transition-colors pointer-events-auto"
                                    onClick={() => setLightboxIndex(null)}
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>

                            {lightboxIndex > 0 && (
                                <button 
                                    className="hidden sm:flex absolute left-4 top-1/2 -translate-y-1/2 p-3 bg-black/40 text-white rounded-full hover:bg-black/60 z-10 pointer-events-auto"
                                    onClick={() => setLightboxIndex(prev => prev - 1)}
                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>
                                </button>
                            )}

                            {lightboxIndex < FULL_LIST_IMAGES.length - 1 && (
                                <button 
                                    className="hidden sm:flex absolute right-4 top-1/2 -translate-y-1/2 p-3 bg-black/40 text-white rounded-full hover:bg-black/60 z-10 pointer-events-auto"
                                    onClick={() => setLightboxIndex(prev => prev + 1)}
                                >
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            )}

                            <div 
                                className="flex-1 w-full h-full flex items-center justify-center p-2 pointer-events-auto"
                                onTouchStart={onTouchStart}
                                onTouchMove={onTouchMove}
                                onTouchEnd={onTouchEnd}
                            >
                                <img 
                                    src={FULL_LIST_IMAGES[lightboxIndex]} 
                                    alt={`片单大图 ${lightboxIndex + 1}`} 
                                    className="max-w-full max-h-full object-contain select-none transition-opacity duration-200"
                                    draggable="false"
                                    onError={(e) => {
                                        e.target.onerror = null;
                                        e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="300" fill="%23111827"><rect width="100%" height="100%"/><text x="50%" y="50%" fill="%236b7280" font-size="16" text-anchor="middle" dy=".3em">请在代码中填入真实的图片地址</text></svg>';
                                    }}
                                />
                            </div>
                        </div>
                    )}

                    {/* ===== 联系方式弹窗 ===== */}
                    {showContactModal && (
                        <div className="fixed inset-0 z-[80] bg-black/50 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col relative">
                                <div className="p-5">
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="font-bold text-gray-800 text-lg">联系作者</h3>
                                        <button onClick={() => setShowContactModal(false)} className="text-gray-400 hover:text-gray-600">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        </button>
                                    </div>
                                    <p className="text-sm text-gray-600 mb-5 leading-relaxed">如果有任何建议和疑问欢迎联系我<p></p>这是一个非盈利网站<p></p>虔诚求offer中…</p>
                                    
                                    <div className="space-y-3">
                                        <div className="flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-100">
                                            <div className="flex items-center gap-2 text-sm text-gray-800">
                                                <span className="text-[#07C160]">
                                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5,13.5A1.5,1.5 0 1,0 7,12A1.5,1.5 0 0,0 8.5,13.5M15.5,13.5A1.5,1.5 0 1,0 14,12A1.5,1.5 0 0,0 15.5,13.5M12,2A10,10 0 0,0 2,12C2,13.56 2.36,15.03 3,16.35L1.5,20.5L5.8,19.2C7.57,20.35 9.7,21 12,21A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"/></svg>
                                                </span>
                                                <span>微信: <span className="font-medium select-all">Kevin_Marco</span></span>
                                            </div>
                                            <button 
                                                onClick={() => handleCopy('Kevin_Marco', 'wechat')} 
                                                className={`text-xs px-2.5 py-1.5 rounded transition-colors border ${copiedWechat ? 'bg-green-50 text-green-600 border-green-200' : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-600'}`}
                                            >
                                                {copiedWechat ? '已复制!' : '复制'}
                                            </button>
                                        </div>
                                        
                                        <div className="flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-100">
                                            <div className="flex items-center gap-2 text-sm text-gray-800">
                                                <span className="text-blue-500">
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                                </span>
                                                <span>邮箱: <span className="font-medium select-all">make11034@163.com</span></span>
                                            </div>
                                            <button 
                                                onClick={() => handleCopy('make11034@163.com', 'email')} 
                                                className={`text-xs px-2.5 py-1.5 rounded transition-colors border ${copiedEmail ? 'bg-green-50 text-green-600 border-green-200' : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-600'}`}
                                            >
                                                {copiedEmail ? '已复制!' : '复制'}
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="text-center mt-6 text-3xl">
                                        🍍
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 头部标题区：固定在顶端 */}
                    <div className="bg-white px-4 py-3 border-b border-gray-100 sticky top-0 z-40 h-[60px] shadow-sm flex justify-between items-center">
                        <div className="flex flex-col justify-center">
                            <h1 className="text-lg font-bold text-gray-800 leading-tight">第十六届北京国际电影节排片表</h1>
                            <div className="flex items-center gap-1.5 text-[10px] text-gray-400 mt-0.5">
                                <span>共载入 {movieData.length} 场放映</span>
                                <span className="text-gray-300">|</span>
                                <span>powered by Marco</span>
                                <button 
                                    onClick={() => setShowContactModal(true)}
                                    className="ml-0.5 px-1.5 py-0.5 bg-gray-50 border border-gray-100 text-gray-400 rounded hover:bg-gray-100 hover:text-gray-600 transition-colors tracking-wide"
                                >
                                    联系作者
                                </button>
                            </div>
                        </div>
                        <button 
                            onClick={() => setIsGalleryOpen(true)}
                            className="flex items-center gap-1.5 bg-[#ff4060] text-white px-3 py-1.5 rounded-full text-xs font-medium hover:bg-[#e63956] transition-colors shadow-[0_2px_6px_rgba(255,64,96,0.3)] shrink-0"
                        >
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            完整片单
                        </button>
                    </div>

                    {/* 核心筛选区：紧随标题吸顶 */}
                    <div className="bg-white border-b border-gray-200 sticky top-[60px] z-30 p-3 shadow-md flex flex-col justify-center gap-3 h-[130px]">
                        {parseError ? (
                            <div className="text-sm text-red-500 text-center font-bold h-full flex items-center justify-center">{parseError}</div>
                        ) : movieData.length === 0 ? (
                            <div className="text-sm text-gray-500 text-center h-full flex items-center justify-center">数据解析中...</div>
                        ) : (
                            <>
                                <div className="grid grid-cols-2 gap-2">
                                    <FilterDropdown 
                                        label="日期" icon="📆" options={dates} selectedValues={selectedDates} onChange={setSelectedDates} 
                                        formatLabel={d => formatShortDate(d) + " " + getWeekday(d)} 
                                    />
                                    <FilterDropdown 
                                        label="影院" icon="🎥" options={venues} selectedValues={selectedVenues} onChange={setSelectedVenues} 
                                    />
                                    <FilterDropdown 
                                        label="单元" icon="🏷️" options={units} selectedValues={selectedUnits} onChange={setSelectedUnits} 
                                    />

                                    <div 
                                        className="w-full text-xs sm:text-sm border border-gray-300 rounded px-2 py-1.5 bg-gray-50 flex items-center justify-between cursor-pointer hover:border-[#ff4060]"
                                        onClick={() => setShowMovieSelector(true)}
                                    >
                                        <span className="truncate text-gray-700">
                                            🎞️ 影片: {selectedMovies.length > 0 ? (selectedMovies.length === 1 ? selectedMovies[0] : `已选 ${selectedMovies.length} 部`) : (selectedUnits.length > 0 ? "该单元下全部" : "全部")}
                                        </span>
                                        <svg className="w-3.5 h-3.5 text-gray-400 shrink-0 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>
                                
                                <label className="flex items-center justify-between text-sm bg-gray-50 border border-gray-200 rounded px-3 py-1.5 cursor-pointer hover:bg-gray-100 transition-colors">
                                    <span className="text-gray-700 font-medium text-xs sm:text-sm">仅显示带有特殊活动场次</span>
                                    <div className="relative inline-block w-10 align-middle select-none">
                                        <input type="checkbox" className="absolute opacity-0 w-0 h-0" checked={hasActivity} onChange={e => setHasActivity(e.target.checked)} />
                                        <div className={`block w-10 h-5 rounded-full transition-colors duration-200 ease-in-out ${hasActivity ? 'bg-[#ff4060]' : 'bg-gray-300'}`}></div>
                                        <div className={`absolute left-0.5 top-0.5 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out shadow-sm ${hasActivity ? 'transform translate-x-5' : ''}`}></div>
                                    </div>
                                </label>
                            </>
                        )}
                    </div>

                    {/* 影片列表区 */}
                    <div className="flex-1 pb-10 bg-[#f5f5f5]">
                        {Object.keys(scheduleData).length === 0 && movieData.length > 0 && !parseError && (
                            <div className="text-center py-20 text-gray-400 flex flex-col items-center">
                                <svg className="w-12 h-12 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                没有找到符合该筛选条件的场次
                            </div>
                        )}

                        {Object.entries(scheduleData).map(([date, venues]) => (
                            <div key={date}>
                                {selectedDates.length !== 1 && (
                                    <div className="px-4 py-2 bg-[#ff4060] text-white text-sm font-bold sticky top-[190px] z-20 shadow-sm flex items-center gap-2 h-[36px]">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                        {formatShortDate(date)} {getWeekday(date)}
                                    </div>
                                )}

                                {Object.entries(venues).map(([venue, movies]) => (
                                    <div key={`${date}-${venue}`} className="bg-white mb-2 shadow-sm">
                                        <div 
                                            className="px-4 py-3 bg-[#f0f9ff] border-b border-blue-100 flex items-center gap-2 sticky z-10 shadow-[0_2px_4px_rgba(0,0,0,0.02)]"
                                            style={{ top: selectedDates.length === 1 ? '190px' : '226px' }}
                                        >
                                            <svg className="w-4 h-4 text-sky-500 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                                <path fillRule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd" />
                                            </svg>
                                            <span className="font-bold text-sky-500 text-sm leading-tight">{venue}</span>
                                        </div>

                                        <div className="px-4">
                                            {movies.map((movie, index) => (
                                                <div key={index} className="flex py-4 border-b border-gray-50 last:border-none hover:bg-gray-50 transition-colors">
                                                    <div className="w-[72px] shrink-0 flex flex-col pt-0.5">
                                                        <span className="text-xl font-bold text-gray-900 leading-none mb-1.5">{movie.time}</span>
                                                        <span className="text-[11px] text-gray-400 leading-none">{movie.endTime}散场</span>
                                                    </div>

                                                    <div className="flex-1 min-w-0 pr-2">
                                                        <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                                                            <h3 className="text-[18px] sm:text-[20px] font-bold text-gray-900 leading-tight">
                                                                {movie.name}
                                                            </h3>
                                                            <DoubanBadge score={movie.doubanScore} link={movie.doubanLink} />
                                                        </div>
                                                        <div className="text-[12px] text-gray-500 leading-snug line-clamp-1">
                                                            {/* ✨ 年份信息已加入呈现 ✨ */}
                                                            {movie.unit} {movie.unit && " | "} {movie.year && `${movie.year}年 | `} {movie.duration}分钟
                                                        </div>
                                                    </div>

                                                    {movie.activity && (
                                                        <div className="shrink-0 flex items-start pt-0.5">
                                                            <span className="inline-block border border-orange-400 text-orange-500 text-[10px] px-1.5 py-0.5 rounded font-medium">
                                                                {movie.activity}
                                                            </span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>

                    {/* 🌟 优化后的高颜值“回到顶部”按钮 🌟 */}
                    {showTopBtn && (
                        <button
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                            className="fixed bottom-12 left-1/2 -translate-x-1/2 z-[9999] flex items-center justify-center text-gray-600 hover:text-[#ff4060] transition-all duration-300 drop-shadow-lg touch-manipulation animate-fade-in"
                            style={{
                                width: '64px',
                                height: '64px',
                                /* 高级径向渐变，纯白向边缘透明羽化过渡 */
                                background: 'radial-gradient(circle, rgba(255,255,255,0.95) 20%, rgba(255,255,255,0) 70%)',
                            }}
                            title="回到顶部"
                        >
                            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
                            </svg>
                        </button>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
