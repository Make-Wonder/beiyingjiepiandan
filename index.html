            const [hours, minutes] = timeStr.split(":").map(Number);

            const endHours = Math.floor(totalMins / 60) % 24;
            const endMins = totalMins % 60;
            return `${String(endHours).padStart(2, '0')}:${String(endMins).padStart(2, '0')}`;

                                                        <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                                                            <h3 className="text-[16px] font-bold text-gray-900 leading-tight">
                                                                {movie.name}
                                                            </h3>
                                                            <DoubanBadge score={movie.doubanScore} link={movie.doubanLink} />
                                                        </div>
                                                        <div className="text-[12px] text-gray-500 leading-snug line-clamp-1">
                                                            {movie.unit} {movie.unit && " | "} {movie.duration}分钟
                                                        </div>
                                                    </div>

                                                    {/* 右侧：活动角标 */}
                                                    {movie.activity && (
                                                        <div className="shrink-0 flex items-start pt-0.5">
                                                            <span className="inline-block border border-orange-400 text-orange-500 text-[10px] px-1.5 py-0.5 rounded font-medium">
                                                                {movie.activity}
                                                            </span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
