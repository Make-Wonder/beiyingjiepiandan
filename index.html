        const calculateEndTime = (timeStr, durationMins) => {
            if (!timeStr || !durationMins) return "";
            const [hours, minutes] = timeStr.split(":").map(Number);
            const totalMins = hours * 60 + minutes + parseInt(durationMins);
            const endHours = Math.floor(totalMins / 60) % 24;
            const endMins = totalMins % 60;
            return `${String(endHours).padStart(2, '0')}:${String(endMins).padStart(2, '0')}`;
        };

        const checkConflict = (prevMovie, currentMovie) => {
            if (!prevMovie || !currentMovie) return false;
            const [prevH, prevM] = prevMovie.time.split(':').map(Number);
            const [currH, currM] = currentMovie.time.split(':').map(Number);
            
            const prevStartMins = prevH * 60 + prevM;
            const prevEndMins = prevStartMins + parseInt(prevMovie.duration);
            
            let currStartMins = currH * 60 + currM;
            if (currStartMins < prevStartMins) currStartMins += 24 * 60; 
            return currStartMins < prevEndMins;
        };

                        headerIndex = i;

                const validCsvString = headerIndex !== -1 ? lines.slice(headerIndex).join("\n") : RAW_CSV_DATA.trim();

                Papa.parse(validCsvString, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const parsed = [];
                        results.data.forEach(row => {
                            const name = row["影片中文名"] || row["影片名称"] || "";
                            const year = row["年份"] || ""; 
                            const timeStr = row["放映时间"] || "";
                            const duration = row["片长(分钟)"] || row["片长"] || "90";

                            const date = timeParts[0];

                            let hash = 0;
                            for (let i = 0; i < str.length; i++) {
                                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                                hash |= 0;
                            }
                            const _uid = Math.abs(hash).toString(36) + time.replace(':', '');

                            parsed.push({

                                endTime: calculateEndTime(time, duration)
                            });
                        });

            const venues = useMemo(() => Array.from(new Set(movieData.map(m => m.venue))).sort(), [movieData]);
            const units = useMemo(() => Array.from(new Set(movieData.map(m => m.unit).filter(Boolean))).sort(), [movieData]);
            
            const availableMovies = useMemo(() => {
                let filtered = movieData;
                if (selectedUnits.length > 0) {
                    filtered = filtered.filter(m => selectedUnits.includes(m.unit));

            useEffect(() => {

                        setShowTopBtn(true);
                    } else {
                        setShowTopBtn(false);
                    }
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                document.addEventListener('scroll', handleScroll, { passive: true });
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    document.removeEventListener('scroll', handleScroll);
                };

            const toggleSchedule = (uid) => {
                if (selectedSchedules.includes(uid)) {

                    setSelectedSchedules([...selectedSchedules, uid]);

            const toggleShareSelection = (uid) => {

            const rawFilteredData = useMemo(() => {
                return movieData.filter(m => {
                    if (selectedDates.length > 0 && !selectedDates.includes(m.date)) return false;
                    if (selectedVenues.length > 0 && !selectedVenues.includes(m.venue)) return false;
                    if (selectedUnits.length > 0 && !selectedUnits.includes(m.unit)) return false;
                    if (selectedMovies.length > 0 && !selectedMovies.includes(m.name)) return false;
                    if (hasActivity && (!m.activity || m.activity.trim() === "")) return false;
                    return true;
                }).sort((a, b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    return a.time.localeCompare(b.time);

                rawFilteredData.forEach(movie => {

                    grouped[movie.date][movie.venue].push(movie);

                return grouped;

            const myCalendarData = useMemo(() => {
                const list = movieData.filter(m => selectedSchedules.includes(m._uid)).sort((a, b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    return a.time.localeCompare(b.time);
                });
                const grouped = {};
                list.forEach(m => {
                    if (!grouped[m.date]) grouped[m.date] = [];
                    grouped[m.date].push(m);
                });
                return grouped;
            }, [selectedSchedules, movieData]);

            const exportShareData = useMemo(() => {

                    return a.time.localeCompare(b.time);

                const grouped = {};
                list.forEach(m => {

                                        <button

                    {/* ===== 生成中 Loading 提示 ===== */}
                    {isGenerating && (

                                                <input type="checkbox" className="absolute opacity-0 w-0 h-0" checked={hasActivity} onChange={e => setHasActivity(e.target.checked)} />
                                                <div className={`block w-10 h-5 rounded-full transition-colors duration-200 ease-in-out ${hasActivity ? 'bg-[#ff4060]' : 'bg-gray-300'}`}></div>
                                                <div className={`absolute left-0.5 top-0.5 bg-white w-4 h-4 rounded-full transition-transform duration-200 ease-in-out shadow-sm ${hasActivity ? 'transform translate-x-5' : ''}`}></div>
                                            </div>
                                        </label>
                                    </>
                                )}
                            </div>

                            {/* 影片列表展示区 (按影院分组) */}
                            <div className="flex-1 bg-[#f5f5f5] animate-fade-in">
                                {Object.keys(scheduleDataGroupedByVenue).length === 0 && movieData.length > 0 && !parseError && (
                                    <div className="text-center py-20 text-gray-400 flex flex-col items-center">
                                        <svg className="w-12 h-12 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        没有找到符合条件的场次
                                    </div>
                                )}

                                {Object.entries(scheduleDataGroupedByVenue).map(([date, venues]) => (
                                    <div key={date}>
                                        {selectedDates.length !== 1 && (
                                            <div className="px-4 py-2 bg-[#ff4060] text-white text-sm font-bold sticky top-[190px] z-20 shadow-sm flex items-center gap-2 h-[36px]">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                                {formatShortDate(date)} {getWeekday(date)}
                                            </div>
                                        )}

                                        {Object.entries(venues).map(([venue, movies]) => (
                                            <div key={`${date}-${venue}`} className="bg-white mb-2 shadow-sm">
                                                <div className="px-4 py-3 bg-[#f0f9ff] border-b border-blue-100 flex items-center gap-2 sticky z-10 shadow-[0_2px_4px_rgba(0,0,0,0.02)]" style={{ top: selectedDates.length === 1 ? '190px' : '226px' }}>
                                                    <svg className="w-4 h-4 text-sky-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd" /></svg>
                                                    <span className="font-bold text-sky-500 text-sm leading-tight">{venue}</span>
                                                </div>

                                                <div className="px-4">
                                                    {movies.map((movie, index) => {
                                                        const isSelected = selectedSchedules.includes(movie._uid);
                                                        return (
                                                            <div key={index} className="flex py-4 border-b border-gray-50 last:border-none hover:bg-gray-50 transition-colors relative pr-16">
                                                                <div className="w-[72px] shrink-0 flex flex-col pt-0.5">
                                                                    <span className="text-xl font-bold leading-none mb-1.5 text-gray-900">{movie.time}</span>
                                                                    <span className="text-[11px] text-gray-400 leading-none">{movie.endTime}散场</span>
                                                                </div>
                                                                <div className="flex-1 min-w-0 pr-2">
                                                                    <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                                                                        <h3 className="text-[18px] sm:text-[20px] font-bold leading-tight text-gray-900">{movie.name}</h3>
                                                                        <DoubanBadge score={movie.doubanScore} link={movie.doubanLink} />
                                                                    </div>
                                                                    <div className="text-[12px] text-gray-500 leading-snug line-clamp-1">
                                                                        {movie.unit} {movie.unit && " | "} {movie.year && `${movie.year}年 | `} {movie.duration}分钟
                                                                    </div>
                                                                </div>

                                                                {movie.activity && (
                                                                    <div className="shrink-0 flex items-start pt-0.5">
                                                                        <span className="inline-block border border-orange-400 text-orange-500 text-[10px] px-1.5 py-0.5 rounded font-medium">{movie.activity}</span>
                                                                    </div>
                                                                )}

                                                                {/* ✨ 快捷加入日历按钮 ✨ */}
                                                                <div className="absolute right-0 top-1/2 -translate-y-1/2 flex flex-col items-center">
                                                                    <button onClick={() => toggleSchedule(movie._uid)} className={`p-2 rounded-full border transition-colors touch-manipulation ${isSelected ? 'bg-red-50 border-red-200 text-[#ff4060]' : 'bg-white border-gray-300 text-gray-300 hover:bg-gray-50 hover:text-gray-500'}`}>
                                                                        <svg className="w-5 h-5" fill={isSelected ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                                                    </button>
                                                                    <span className={`text-[10px] mt-1 font-medium ${isSelected ? 'text-[#ff4060]' : 'text-gray-400'}`}>{isSelected ? '已加入' : '加日历'}</span>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {/* ======================================================== */}
                    {/* 我的日历视图 (按纯时间线排列，支持多选分享及冲突预警) */}
                    {/* ======================================================== */}
                    {activeTab === 'calendar' && (
                        <div className="flex-1 bg-[#f5f5f5] flex flex-col animate-fade-in relative min-h-screen">
                            {/* 日历控制栏 */}
                            <div className="bg-white border-b border-gray-200 p-3 shadow-sm flex justify-between items-center sticky top-[60px] z-30">
                                <div className="font-bold text-gray-800 text-sm">已锁定了 {selectedSchedules.length} 场放映</div>
                                {selectedSchedules.length > 0 && (
                                    !isShareMode ? (
                                        <button 
                                            onClick={() => { setIsShareMode(true); setShareSelection([...selectedSchedules]); }} 
                                            className="text-xs bg-blue-50 border border-blue-200 text-blue-600 px-3 py-1.5 rounded-full font-bold shadow-sm transition-colors hover:bg-blue-100 touch-manipulation"
                                        >
                                            🚀 发送给朋友 / 保存长图
                                        </button>
                                    ) : (
                                        <div className="flex gap-2">
                                            <button onClick={() => setShareSelection([...selectedSchedules])} className="text-xs px-3 py-1.5 bg-gray-100 text-gray-700 font-bold rounded-full touch-manipulation">全选</button>
                                            <button onClick={() => setIsShareMode(false)} className="text-xs px-3 py-1.5 bg-red-50 text-red-600 font-bold rounded-full border border-red-100 touch-manipulation">取消</button>
                                        </div>
                                    )
                                )}
                            </div>

                            {selectedSchedules.length === 0 ? (
                                <div className="text-center py-32 flex flex-col items-center px-6">
                                    <div className="text-5xl mb-4">📝</div>
                                    <h3 className="text-lg font-bold text-gray-700 mb-2">您的日历还是空的</h3>
                                    <p className="text-sm text-gray-500">点击上方「全部排片」，遇到想看的电影点击右侧的爱心即可加入您的专属日历。</p>
                                </div>
                            ) : (
                                <div className="pb-24">
                                    {Object.entries(myCalendarData).map(([date, movies]) => (
                                        <div key={date} className="mb-3">
                                            <div className="px-4 py-2 bg-gray-800 text-white text-sm font-bold sticky z-20 shadow-sm flex justify-between items-center" style={{ top: '115px' }}>
                                                <div className="flex items-center gap-2">
                                                    <svg className="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                                    {formatShortDate(date)} {getWeekday(date)}
                                                </div>
                                                <div className="text-xs text-gray-300 font-normal">当天共 {movies.length} 场</div>
                                            </div>
                                            
                                            <div className="bg-white">
                                                {movies.map((movie, index) => {
                                                    const isSelected = shareSelection.includes(movie._uid);
                                                    // ✨ 在日历UI中调用冲突预警检测逻辑
                                                    const isConflict = index > 0 && checkConflict(movies[index - 1], movie);
                                                    return (
                                                        <div key={movie._uid} className="flex py-5 px-4 border-b border-gray-100 last:border-none relative">
                                                            {/* 分享模式下的复选框 */}
                                                            {isShareMode && (
                                                                <div className="w-8 shrink-0 flex items-center touch-manipulation cursor-pointer" onClick={() => toggleShareSelection(movie._uid)}>
                                                                    <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-[#ff4060] border-[#ff4060]' : 'bg-white border-gray-300'}`}>
                                                                        {isSelected && <svg className="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}
                                                                    </div>
                                                                </div>
                                                            )}
                                                            
                                                            <div className="w-[75px] shrink-0 pt-0.5 border-r border-gray-100 mr-3">
                                                                <div className="text-[22px] font-bold text-gray-900 leading-none tracking-tight">{movie.time}</div>
                                                                <div className="text-[11px] text-gray-400 mt-1.5">{movie.endTime}散场</div>
                                                            </div>

                                                            <div className="flex-1 min-w-0 pr-8">
                                                                <div className="text-[17px] font-bold text-gray-900 leading-tight mb-1.5 break-words">{movie.name}</div>
                                                                <div className="text-[13px] text-sky-600 font-bold mb-1 flex items-start gap-1">
                                                                    <span className="shrink-0 mt-0.5"><svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd" /></svg></span>
                                                                    <span>{movie.venue}</span>
                                                                </div>
                                                                <div className="text-[12px] text-gray-500 break-words">
                                                                    {movie.unit} {movie.unit && "|"} {movie.year && `${movie.year}年 | `} {movie.duration}分钟
                                                                </div>
                                                                {movie.activity && (
                                                                    <div className="mt-1.5 inline-block border border-orange-400 text-orange-500 text-[10px] px-1.5 py-0.5 rounded font-medium">{movie.activity}</div>
                                                                )}
                                                                
                                                                {/* ✨ 日历界面的黄色冲突警告标签 ✨ */}
                                                                {isConflict && (
                                                                    <div className="mt-2 inline-flex items-center gap-1 bg-amber-50 border border-amber-200 text-amber-600 text-[11px] px-2 py-1 rounded font-bold">
                                                                        ⚠️ 与上一场放映时间冲突
                                                                    </div>
                                                                )}
                                                            </div>

                                                            {/* 非分享模式下的移除按钮 */}
                                                            {!isShareMode && (
                                                                <button onClick={() => toggleSchedule(movie._uid)} className="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-gray-300 hover:text-red-500 transition-colors touch-manipulation">
                                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                                </button>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* 🌟 底部固定生成日程按钮 (仅在日历分享模式下显示) 🌟 */}
                            {isShareMode && (
                                <div className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] p-3 z-50 animate-slide-up flex items-center justify-between">
                                    <div className="flex flex-col ml-2">
                                        <span className="text-gray-500 text-xs">勾选了</span>
                                        <span className="text-[#ff4060] font-bold text-lg leading-tight">{shareSelection.length} 场</span>
                                    </div>
                                    <button 
                                        onClick={handleGenerateImage}
                                        className={`px-6 py-2.5 rounded-full font-bold text-white shadow-md transition-all touch-manipulation ${shareSelection.length > 0 ? 'bg-[#ff4060] hover:bg-[#e63956]' : 'bg-gray-300 cursor-not-allowed'}`}
                                    >
                                        生成分享图片与链接
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 🌟 极高层级、全端兼容的回到顶部按钮 🌟 */}
                    {showTopBtn && (
                        <button
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                            className={`fixed left-1/2 -translate-x-1/2 z-[99999] flex items-center justify-center text-gray-500 hover:text-[#ff4060] transition-all duration-300 touch-manipulation animate-fade-in ${isShareMode ? 'bottom-24' : 'bottom-10'}`}
                            style={{ width: '64px', height: '64px', background: 'radial-gradient(circle, rgba(255,255,255,0.95) 20%, rgba(255,255,255,0) 70%)' }}
                        >
                            <svg className="w-8 h-8 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
                            </svg>
                        </button>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
